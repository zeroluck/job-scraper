name: Parse Resume Manually

on:
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get install -y jq

      - name: Clear existing resume for test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          JOB_ID=$(curl -s -X GET "${SUPABASE_URL}/rest/v1/jobs?select=job_id&is_active=eq.true&customized_resume_id=not.is.null&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" | jq -r '.[0].job_id // empty')
          if [ -n "$JOB_ID" ]; then
            echo "Clearing customized_resume_id for job: $JOB_ID"
            curl -s -X PATCH "${SUPABASE_URL}/rest/v1/jobs?job_id=eq.${JOB_ID}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              -d '{"customized_resume_id": null, "resume_score_stage": "initial"}'
            echo "Cleared. Job $JOB_ID will be re-processed."
          else
            echo "No eligible jobs found to clear. Proceeding anyway."
          fi
        continue-on-error: true

      - name: Run resume customization script
        env:
          GEMINI_SECOND_API_KEY: ${{ secrets.GEMINI_SECOND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
        run: python custom_resume_generator.py

      - name: Output PDF link
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LINK=$(curl -s -X GET "${SUPABASE_URL}/rest/v1/customized_resumes?select=resume_link,created_at&order=created_at.desc&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" | jq -r '.[0].resume_link // "No link found"')
          echo "::notice::Latest resume PDF: ${LINK}"
